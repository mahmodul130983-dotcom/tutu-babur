x2="100%"
y2="100%">

<stop offset="0%" stop-color="#7f8cff"/>
<stop offset="100%" stop-color="#5865d8"/>

</linearGradient>

<filter id="shadow">

<feDropShadow
dx="0"
dy="6"
stdDeviation="8"
flood-opacity=".18"/>

</filter>

</defs>

<!-- ===========================
     CHARACTER
=========================== -->

<g id="shantoCharacter"
filter="url(#shadow)">

