<?xml version="1.0" encoding="UTF-8"?>

<svg
xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 700 700">

<!-- ===========================
     DEFS
=========================== -->

<defs>

<linearGradient
id="hoodieGradient"
x1="0%"
