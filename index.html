<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>For My Strongest Girl ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Floating Petals -->
    <div id="lily-container"></div>

    <!-- Background -->
    <div class="bgGlow"></div>
    <div class="stars"></div>

    <!-- ==========================
         HERO
    =========================== -->

    <section class="hero">

        <h3 class="smallTitle">
            🌸 Just For You 🌸
        </h3>

        <h1 id="title">
            For My Strongest Girl
        </h1>

        <h2 class="name">
            Sumu 💜
        </h2>

        <p id="typing"></p>

        <!-- Characters -->

        <div class="characterArea">

            <img
                src="shanto.svg"
                class="shantoSvg"
                alt="Shanto">

            <img
                src="sumu.svg"
                class="sumuSvg"
                alt="Sumu">

        </div>

        <!-- Main Button -->

        <button id="startBtn">

            Open My Heart ❤️

        </button>

        <!-- Controls -->

        <div class="controls">

            <button id="comfortBtn">

                🫂 Virtual Hug

            </button>

            <button id="openWhenBtn">

                💌 Open When You Need Me

            </button>

        <!-- ==========================================
     PART 7.2
     LETTER CARD
========================================== -->

<div id="letterCard">

    <div class="letterIcon">
        💌
    </div>

    <h3>Open When You Need Me</h3>

    <p id="messageBox">
        Press the button above ❤️
    </p>

</div>

    </section>

    <!-- ==========================
         ENDING
    =========================== -->

    <section class="ending">

        <div class="heartCircle">

            ❤️

        </div>

        <h2>

            For My Strongest Girl 🌷

        </h2>

        <p>

            Periods don't make you less beautiful.
            <br><br>

            They remind me how strong you are.

        </p>

        <h3>

            I Love You More Than Yesterday 💜

        </h3>

    </section>

    <!-- JavaScript -->

    <script src="script.js"></script>
<!-- ==========================================
     PART 7.3
     MUSIC + FOOTER
========================================== -->

<!-- Music -->

<button id="musicBtn">

🎵 Play Music

</button>

<audio id="bgMusic" loop>

<source src="music/piano.mp3" type="audio/mpeg">

</audio>

<!-- Butterflies -->

<div class="butterfly b1">🦋</div>
<div class="butterfly b2">🦋</div>
<div class="butterfly b3">🦋</div>

<!-- Footer -->

<footer>

Made with ❤️ by Shanto

</footer>
</body>

</html>
