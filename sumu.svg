  <!-- ==========================================
     PART 5.8
     SVG ANIMATIONS
========================================== -->

<!-- ===== Blink Animation ===== -->
<style>

@keyframes blink {

    0%, 96%, 100%{
        transform:scaleY(1);
    }

    97%,99%{
        transform:scaleY(.08);
    }

}

#eyeLeft,
#eyeRight{

    animation:blink 5s infinite;
    transform-box:fill-box;
    transform-origin:center;

}

/* ========================= */

@keyframes breathe{

    0%,100%{
        transform:translateY(0px) scale(1);
    }

    50%{
        transform:translateY(-2px) scale(1.01);
    }

}

#bodyBreath{

    animation:breathe 4s ease-in-out infinite;

}

/* ========================= */

@keyframes swing{

    0%,100%{
        transform:rotate(0deg);
    }

    25%{
        transform:rotate(1deg);
    }

    75%{
        transform:rotate(-1deg);
    }

}

#hairSwing{

    animation:swing 6s ease-in-out infinite;
    transform-box:fill-box;
    transform-origin:350px 120px;

}

/* ========================= */

@keyframes flowerMove{

    0%,100%{
        transform:rotate(0deg);
    }

    50%{
        transform:rotate(3deg);
    }

}

#lilyFlower{

    animation:flowerMove 3.5s ease-in-out infinite;
    transform-box:fill-box;
    transform-origin:350px 330px;

}

/* ========================= */

@keyframes floatHeart{

    0%{

        transform:translateY(0);
        opacity:.7;

    }

    50%{

        transform:translateY(-10px);
        opacity:1;

    }

    100%{

        transform:translateY(0);
        opacity:.7;

    }

}

#floatingHearts path:nth-child(1){

    animation:floatHeart 3s ease-in-out infinite;

}

#floatingHearts path:nth-child(2){

    animation:floatHeart 3s ease-in-out infinite .8s;

}

/* ========================= */

@keyframes twinkle{

    0%,100%{

        opacity:.25;

    }

    50%{

        opacity:1;

    }

}

.sparkle{

    animation:twinkle 2s infinite;

}

</style>

